<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Omkar 3D Gallery</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
#ui {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  opacity: 0.6;
}
#title {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  letter-spacing: 3px;
}
</style>
</head>
<body>

<div id="title">OMKAR GALLERY</div>
<div id="ui">Click to Start • WASD to Move • Mouse to Look</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

// Camera
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

// Renderer
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
light.castShadow = true;
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// Floor
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0xeeeeee})
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// Walls
function wall(x,z,rot){
 let m=new THREE.Mesh(
   new THREE.PlaneGeometry(100,10),
   new THREE.MeshStandardMaterial({color:0xffffff})
 );
 m.position.set(x,5,z);
 m.rotation.y=rot;
 scene.add(m);
}
wall(0,-50,0); wall(0,50,Math.PI);
wall(-50,0,Math.PI/2); wall(50,0,-Math.PI/2);

// Image loader
let loader = new THREE.TextureLoader();

// Frames with real images
function frame(x,z,rot,img){
 let tex = loader.load(img);
 let m = new THREE.Mesh(
   new THREE.PlaneGeometry(3,4),
   new THREE.MeshStandardMaterial({map:tex})
 );
 m.position.set(x,3,z);
 m.rotation.y=rot;
 scene.add(m);
}

// Add many images
let imgs = [
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1492724441997-5dc865305da7",
"https://images.unsplash.com/photo-1501785888041-af3ef285b470"
];

for(let i=-40;i<=40;i+=10){
 frame(i,-49,0,imgs[i%3]);
 frame(i,49,Math.PI,imgs[(i+1)%3]);
 frame(-49,i,Math.PI/2,imgs[(i+2)%3]);
 frame(49,i,-Math.PI/2,imgs[i%3]);
}

// Character
let player = new THREE.Object3D();
scene.add(player);

let gltfLoader = new THREE.GLTFLoader();
gltfLoader.load(
  "https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb",
  (gltf)=>{
    let model = gltf.scene;
    model.scale.set(0.5,0.5,0.5);
    player.add(model);
  }
);

// Controls
let keys = {};
document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

let yaw=0,pitch=0;
document.body.addEventListener("mousemove",e=>{
 yaw-=e.movementX*0.002;
 pitch-=e.movementY*0.002;
 pitch=Math.max(-1.5,Math.min(1.5,pitch));
});

document.body.onclick=()=>document.body.requestPointerLock();

// Movement
function move(){
 let speed=0.15;
 let dir=new THREE.Vector3();

 if(keys["w"]) dir.z-=1;
 if(keys["s"]) dir.z+=1;
 if(keys["a"]) dir.x-=1;
 if(keys["d"]) dir.x+=1;

 dir.normalize();

 let forward=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
 let right=new THREE.Vector3(forward.z,0,-forward.x);

 player.position.add(forward.multiplyScalar(dir.z*speed));
 player.position.add(right.multiplyScalar(dir.x*speed));

 // Camera follow (smooth)
 camera.position.lerp(
   new THREE.Vector3(
     player.position.x - Math.sin(yaw)*5,
     player.position.y + 3,
     player.position.z - Math.cos(yaw)*5
   ),
   0.1
 );

 camera.lookAt(player.position);
}

// Animate
function animate(){
 requestAnimationFrame(animate);
 move();
 renderer.render(scene,camera);
}
animate();

// Resize
onresize=()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
};
</script>

</body>
</html>
